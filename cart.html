<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | ProNutra Nutrition Store</title>
  <meta name="description" content="Review your ProNutra cart with protein supplements, nutrition diet products, and wellness essentials.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="cart">
  <header class="site-header compact">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html"><span>Pro</span>Nutra</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item ms-lg-3"><a class="btn btn-warning nav-cart" href="cart.html"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span><strong id="cartCount">0</strong></a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="page-title">
      <div class="container">
        <p class="eyebrow">Shopping Cart</p>
        <h1>Your Shopping Cart</h1>
        <p>Review your nutrition products, update quantities, and continue to secure checkout.</p>
      </div>
    </div>
  </header>

  <main class="section-pad">
    <div class="container">
      <div class="cart-layout">
        <section class="panel">
          <h2>Cart Items</h2>
          <div id="cartItems"></div>
        </section>
        <aside class="panel summary-panel">
          <h2>Order Summary</h2>
          <div class="summary-line"><span>Subtotal</span><strong id="cartSubtotal">Rs. 0</strong></div>
          <div class="summary-line"><span>GST 18%</span><strong id="cartTax">Rs. 0</strong></div>
          <div class="summary-line"><span>Delivery</span><strong id="cartDelivery">Rs. 0</strong></div>
          <div class="summary-line total"><span>Total</span><strong id="cartTotal">Rs. 0</strong></div>
          <a class="btn btn-success w-100 mt-3" id="checkoutLink" href="checkout.html"><i class="fa-solid fa-lock me-2"></i>Proceed to Checkout</a>
          <button class="btn btn-outline-danger w-100 mt-2" id="clearCartBtn" type="button">Clear Cart</button>
        </aside>
      </div>
    </div>
  </main>

  <div id="toastArea" class="toast-area"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
